<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f6f8fa;
  color: #1f2328;
}

.shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 16px 48px;
}

.panel {
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(31, 35, 40, 0.08);
  overflow: hidden;
}

.panel header {
  padding: 20px 24px;
  border-bottom: 1px solid #d8dee4;
}

.panel h1 {
  margin: 0 0 6px;
  font-size: 24px;
}

.panel p {
  margin: 0;
  color: #656d76;
}

ul.entries {
  list-style: none;
  margin: 0;
  padding: 0;
}

ul.entries li + li {
  border-top: 1px solid #d8dee4;
}

ul.entries a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  color: #0969da;
  text-decoration: none;
}

ul.entries a:hover {
  background: #f6f8fa;
}

.icon {
  width: 24px;
  color: #656d76;
  text-align: center;
}

.meta {
  margin-left: auto;
  color: #656d76;
  font-size: 14px;
}
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header>
        <h1>{{ .Heading }}</h1>
        <p>{{ .Subtitle }}</p>
      </header>
      <ul class="entries">
{{- range .Entries }}
        <li>
          <a href="{{ .URL }}">
            <span class="icon">{{ .Icon }}</span>
            <span>{{ .Name }}</span>
            <span class="meta">{{ .Kind }}</span>
          </a>
        </li>
{{- end }}
      </ul>
    </section>
  </main>
</body>
</html>
